name: run-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            php: '8.1'
            laravel: '10.*'
            testbench: '^8.0'
            stability: prefer-stable

          - os: ubuntu-latest
            php: '8.2'
            laravel: '10.*'
            testbench: '^8.0'
            stability: prefer-stable

          - os: ubuntu-latest
            php: '8.2'
            laravel: '11.*'
            testbench: '^9.0'
            stability: prefer-stable

          - os: ubuntu-latest
            php: '8.2'
            laravel: '12.*'
            testbench: '^10.0'
            stability: prefer-stable

          - os: ubuntu-latest
            php: '8.3'
            laravel: '12.*'
            testbench: '^10.0'
            stability: prefer-stable

          - os: windows-latest
            php: '8.2'
            laravel: '12.*'
            testbench: '^10.0'
            stability: prefer-stable

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.stability }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite, bcmath, intl, gd, exif, iconv, fileinfo
          coverage: none

      - name: Install Laravel version
        run: composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --dev --no-interaction --no-update

      - name: Install dependencies
        run: composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Execute tests
        run: composer test